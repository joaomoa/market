<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mercado da Sala</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-sky-100 via-amber-50 to-green-50 font-display">
  <div id="app" class="container mx-auto px-4 py-6 max-w-6xl">
    <!-- Header -->
    <header class="text-center mb-8">
      <h1 class="text-4xl md:text-5xl font-extrabold text-sky-800 mb-2">Mercado da Sala</h1>
      <div class="flex justify-center items-center gap-8 text-xl text-slate-600">
        <span id="round-display">Ronda 1</span>
        <span id="timer" class="font-mono font-bold text-sky-700">00:00</span>
        <span class="text-sm text-slate-400">(por ronda)</span>
      </div>
    </header>

    <!-- Asset Cards -->
    <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
      <div id="card-gold" class="asset-card rounded-2xl p-6 shadow-lg bg-white border-4 border-amber-200">
        <div class="text-4xl mb-2">🟡</div>
        <h2 class="text-lg font-bold text-amber-800 mb-3">Ouro</h2>
        <div id="price-gold" class="text-2xl font-bold flex items-center gap-2">
          <span>Preço: 2</span>
          <span id="change-gold" class="text-lg"></span>
        </div>
      </div>

      <div id="card-house" class="asset-card rounded-2xl p-6 shadow-lg bg-white border-4 border-blue-200">
        <div class="text-4xl mb-2">🏠</div>
        <h2 class="text-lg font-bold text-blue-800 mb-3">Casa</h2>
        <div id="price-house" class="text-2xl font-bold flex items-center gap-2">
          <span>Preço: 5</span>
          <span id="change-house" class="text-lg"></span>
        </div>
      </div>

      <div id="card-empresa" class="asset-card rounded-2xl p-6 shadow-lg bg-white border-4 border-purple-200">
        <div class="text-4xl mb-2">🏢</div>
        <h2 class="text-lg font-bold text-purple-800 mb-3">Empresa</h2>
        <div id="price-empresa" class="text-2xl font-bold flex items-center gap-2">
          <span>Preço: 1</span>
          <span id="change-empresa" class="text-lg"></span>
        </div>
      </div>

      <div id="card-carro" class="asset-card rounded-2xl p-6 shadow-lg bg-white border-4 border-orange-200">
        <div class="text-4xl mb-2">🚗</div>
        <h2 class="text-lg font-bold text-orange-800 mb-3">Carro</h2>
        <div id="price-carro" class="text-2xl font-bold flex items-center gap-2">
          <span>Preço: 10</span>
          <span id="change-carro" class="text-lg"></span>
        </div>
      </div>
    </section>

    <!-- Single combined chart -->
    <section class="mb-8">
      <div class="bg-white rounded-xl p-4 shadow">
        <canvas id="chart-all" height="200"></canvas>
      </div>
    </section>

    <!-- Notícias da ronda -->
    <section id="news-section" class="mb-8 bg-white rounded-xl p-6 shadow text-left">
      <p class="text-slate-500 italic">Clica em "Próxima Ronda" para ver as notícias!</p>
    </section>

    <!-- Footer -->
    <footer class="text-center py-6 flex flex-col sm:flex-row gap-4 justify-center items-center">
      <button id="next-round-btn" class="px-12 py-4 bg-amber-500 hover:bg-amber-600 text-white font-bold rounded-xl text-xl transition-colors">
        PRÓXIMA RONDA
      </button>
      <button id="reset-btn" class="px-8 py-3 bg-slate-500 hover:bg-slate-600 text-white font-bold rounded-xl transition-colors">
        RESET
      </button>
    </footer>
  </div>

  <script src="assets/script.js"></script>
</body>
</html>
